<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

<div id="resultContainer">

    <h2 id="statusText">
        Loading...
    </h2>

    <h3>
        Communication Score:
        <span id="communicationScore"></span>
    </h3>

    <h3>
        Confidence Score:
        <span id="confidenceScore"></span>
    </h3>

    <h3>
        Technical Score:
        <span id="technicalScore"></span>
    </h3>

    <h3>
        Overall Score:
        <span id="overallScore"></span>
    </h3>

    <p id="analysisText"></p>

    <br>

    <a id="resumeLink"
       target="_blank">

        Open Resume

    </a>

    <br><br>

    <video id="clipVideo"
           controls
           width="600">
    </video>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
